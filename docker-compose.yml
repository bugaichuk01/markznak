services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-markznak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-markznak}
      POSTGRES_DB: ${POSTGRES_DB:-markznak}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-markznak} -d ${POSTGRES_DB:-markznak}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec uvicorn main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Перекрывает DATABASE_URL из backend/.env (там часто localhost; в контейнере — хост db).
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://markznak:markznak@db:5432/markznak}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      BACKEND_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  frontend_node_modules:
